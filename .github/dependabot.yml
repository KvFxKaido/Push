# Dependabot version updates for the Push monorepo.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Scope: npm/pnpm (one workspace), GitHub Actions, pip (Modal sandbox), Docker.
# Minor/patch bumps are grouped into a single PR to limit churn — every PR here
# also spins up the codex/gemini review workflows and a Workers Builds deploy,
# so noise has a real cost. Major bumps come as individual PRs so they get
# reviewed on their own.
version: 2

updates:
  # ── pnpm workspace: root + app + mcp/github-server ───────────────
  # One entry, not three. The workspace has a single pnpm-lock.yaml, so
  # per-manifest entries would each rewrite the same lockfile and collide —
  # every PR after the first would need a rebase (exactly what happened to the
  # old app/ and root/ manifests under npm). Dependabot walks the workspace
  # packages from the root manifest. The `npm` ecosystem covers pnpm.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      workspace-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # ── GitHub Actions: workflow action versions ─────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      actions-all:
        patterns: ["*"]

  # ── pip: Modal sandbox (sandbox/requirements.txt) ────────────────
  - package-ecosystem: "pip"
    directory: "/sandbox"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"

  # ── Docker: Dockerfile + Dockerfile.sandbox (repo root) ──────────
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
