name: CI

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'cli/**'
      - 'lib/**'
      - 'mcp/**'
      - 'sandbox/**'
      - 'scripts/**'
      - 'docs/cli/schemas/**'
      - 'biome.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/**'
      # Injected orientation file — guarded by lib/agents-budget.test.ts, which
      # only runs (via the app test job) when a changed path triggers this workflow.
      - 'AGENTS.md'
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - 'cli/**'
      - 'lib/**'
      - 'mcp/**'
      - 'sandbox/**'
      - 'scripts/**'
      - 'docs/cli/schemas/**'
      - 'biome.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/**'
      - 'AGENTS.md'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflows:
    name: Lint GitHub Actions workflows
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run actionlint
        run: docker run --rm -v "${GITHUB_WORKSPACE}:/repo" -w /repo rhysd/actionlint:1.7.7@sha256:887a259a5a534f3c4f36cb02dca341673c6089431057242cdc931e9f133147e9

  app:
    name: Lint, Test, Build (app)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Design tokens
        # Blocking ratchet: fails if hardcoded colors exceed the committed
        # baseline in app/scripts/design-token-baseline.json (driven to 0 by
        # the migration). New raw hex must use a DESIGN.md token; if a raw
        # color is genuinely unavoidable, justify it and run
        # `npm run check:design-tokens -- --update`.
        run: npm run check:design-tokens

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  android-build:
    # Verifies the production Vite bundle survives a Capacitor Android build
    # end-to-end on a clean checkout. `app/android/` is committed source, so
    # this job just syncs the freshly-built web assets + plugins into it and
    # runs the debug Gradle build.
    #
    # Runs whenever the workflow runs — the existing top-level `paths`
    # filter triggers on cli/, mcp/, lib/, etc. as well as app/, so this
    # job will run more often than strictly necessary. That's a deliberate
    # tradeoff for simplicity over splitting Android into its own workflow.
    name: Build (android)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          # Capacitor 8 requires Node.js 22+ for `cap add/sync android`.
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Cache Gradle
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('app/package-lock.json', 'app/capacitor.config.ts') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Build SPA
        run: npm run build

      - name: Sync web assets to Android
        run: npx cap sync android

      - name: Native-git checkpoint engine unit tests
        working-directory: app/android
        # Host-JVM tests for the JGit checkpoint logic (commit/dedup,
        # delete-faithfulness, archive round-trip, list, prune cap). No android.*
        # in those methods, so they run on the JVM without a device.
        run: ./gradlew :capacitor-native-git:testDebugUnitTest --no-daemon

      - name: Assemble debug APK
        working-directory: app/android
        # --no-daemon: ephemeral runner, daemon survives nothing useful.
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: app-debug-apk
          path: app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
          if-no-files-found: error

  github-mcp:
    name: Typecheck, Build (github mcp)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: mcp/github-server
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mcp/github-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  cli:
    name: Format, Typecheck, Test (cli)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Runs from the repo root. Biome, tsx, TypeScript, and @types/node all
    # live in the root devDependencies; the CLI itself has no external npm
    # imports (verified by grep: only node built-ins and relative paths to
    # cli/ and lib/), so `npm ci` at the root is the complete install.
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      # Biome's format check covers the entire monorepo (app/, cli/, lib/,
      # mcp/, scripts/, docs/cli/schemas/) because biome.json is at the
      # repo root. The workflow's `paths` filter above explicitly includes
      # every directory Biome formats, so whenever this job runs it's
      # enforcing formatter rules against every file that Biome cares
      # about — no format-relevant change slips past by only touching a
      # path the filter ignores.
      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test:cli

  sandbox:
    name: Validate sandbox
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Validate sandbox app syntax
        run: python -m py_compile sandbox/app.py
