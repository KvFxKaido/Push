name: CI

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'cli/**'
      - 'lib/**'
      - 'mcp/**'
      - 'sandbox/**'
      - 'scripts/**'
      - 'docs/cli/schemas/**'
      - 'biome.json'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/**'
      # Injected orientation file — guarded by lib/agents-budget.test.ts, which
      # only runs (via the app test job) when a changed path triggers this workflow.
      - 'AGENTS.md'
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - 'cli/**'
      - 'lib/**'
      - 'mcp/**'
      - 'sandbox/**'
      - 'scripts/**'
      - 'docs/cli/schemas/**'
      - 'biome.json'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/**'
      - 'AGENTS.md'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflows:
    name: Lint GitHub Actions workflows
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run actionlint
        run: docker run --rm -v "${GITHUB_WORKSPACE}:/repo" -w /repo rhysd/actionlint:1.7.7@sha256:887a259a5a534f3c4f36cb02dca341673c6089431057242cdc931e9f133147e9

  app:
    name: Lint, Test, Build (app)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Design tokens
        # Blocking ratchet: fails if hardcoded colors exceed the committed
        # baseline in app/scripts/design-token-baseline.json (driven to 0 by
        # the migration). New raw hex must use a DESIGN.md token; if a raw
        # color is genuinely unavoidable, justify it and run
        # `pnpm run check:design-tokens -- --update`.
        run: pnpm run check:design-tokens

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm run build

  android-build:
    # Verifies the production Vite bundle survives a Capacitor Android build
    # end-to-end on a clean checkout. `app/android/` is committed source, so
    # this job just syncs the freshly-built web assets + plugins into it and
    # runs the debug Gradle build.
    #
    # Runs whenever the workflow runs — the existing top-level `paths`
    # filter triggers on cli/, mcp/, lib/, etc. as well as app/, so this
    # job will run more often than strictly necessary. That's a deliberate
    # tradeoff for simplicity over splitting Android into its own workflow.
    name: Build (android)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          # Capacitor 8 requires Node.js 22+ for `cap add/sync android`; 24 is
          # the repo-wide floor (root package.json `engines`), so use it here too.
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Cache Gradle
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'app/capacitor.config.ts') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SPA
        run: pnpm run build

      - name: Sync web assets to Android
        run: npx cap sync android

      - name: Native-git checkpoint engine unit tests
        working-directory: app/android
        # Host-JVM tests for the JGit checkpoint logic (commit/dedup,
        # delete-faithfulness, archive round-trip, list, prune cap). No android.*
        # in those methods, so they run on the JVM without a device.
        run: ./gradlew :capacitor-native-git:testDebugUnitTest --no-daemon

      - name: Assemble debug APK
        working-directory: app/android
        # --no-daemon: ephemeral runner, daemon survives nothing useful.
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: app-debug-apk
          path: app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
          if-no-files-found: error

  github-mcp:
    name: Typecheck, Build (github mcp)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: mcp/github-server
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

  cli:
    name: Format, Typecheck, Test (cli)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Runs from the repo root. Biome, tsx, TypeScript, and @types/node live in
    # the root devDependencies; the CLI's runtime deps (silvery, react) are root
    # dependencies — so `pnpm install --frozen-lockfile` at the root is the complete install. Node 24:
    # silvery 0.21 ships `using` syntax that SyntaxErrors below Node 24 (the CLI
    # floor, declared in root engines). App/mcp jobs stay on their own Node.
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Biome's format check covers the entire monorepo (app/, cli/, lib/,
      # mcp/, scripts/, docs/cli/schemas/) because biome.json is at the
      # repo root. The workflow's `paths` filter above explicitly includes
      # every directory Biome formats, so whenever this job runs it's
      # enforcing formatter rules against every file that Biome cares
      # about — no format-relevant change slips past by only touching a
      # path the filter ignores.
      - name: Format check
        run: pnpm run format:check

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test:cli

  cli-binary:
    name: Single-binary compile + smoke (cli, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Windows is the platform this feature exists for — and where the
        # detection bugs have actually lived (bun's embedded-bundle root is
        # extensionless on Linux but `B:\~BUN\root\cli.mjs` on Windows, which
        # sent daemon start down the wrong spawn branch, commit 8fb0ac5).
        # A Linux-only smoke was green through that bug.
        os: [ubuntu-latest, windows-latest]
    timeout-minutes: 15
    defaults:
      run:
        # Git Bash on the Windows runner — keeps the smoke steps (grep,
        # seq, pipes) identical across the matrix.
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Pinned to the version the single-binary path was validated
          # against. Bump deliberately, with a local compile + smoke first.
          bun-version: '1.3.11'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Bun appends .exe on Windows regardless of --outfile; resolve the
      # real name once and export it for the smoke steps.
      #
      # Compiled Bun binaries otherwise autoload two things from cwd, ahead
      # of applyConfigToEnv() and the env-scrub allowlist, so any repo the
      # user cd's into becomes an injection vector:
      #   --no-compile-autoload-dotenv  — .env / .env.local into process.env
      #     (provider keys, PUSH_* flags)
      #   --no-compile-autoload-bunfig  — bunfig.toml, whose `preload` runs
      #     ARBITRARY CODE before the CLI starts (RCE, not just env)
      # Config comes from ~/.push/config.json only.
      # Silvery is bundled. Optional xterm/ghostty/browser adapters are not Push
      # runtime paths and their peer packages are intentionally absent, so keep
      # only those adapters external to Bun's graph.
      - name: Compile single binary
        run: |
          bun build --compile --no-compile-autoload-dotenv --no-compile-autoload-bunfig --external @termless/xtermjs --external @termless/ghostty --external chromium-bidi cli/cli.ts --outfile push-smoke
          BIN=./push-smoke
          if [ "$RUNNER_OS" = "Windows" ]; then BIN=./push-smoke.exe; fi
          echo "BIN=$BIN" >> "$GITHUB_ENV"

      # The regression this job exists for: if the isDirectRun guard in
      # cli/cli.ts stops recognizing single-executable builds
      # (import.meta.main), the binary compiles fine and exits 0 having
      # done nothing — green in every other job. Assert real output.
      - name: Smoke test — help boots
        run: '"$BIN" --help | grep -q "Push CLI"'

      # `daemon start` from a compiled binary re-execs itself via the
      # internal `daemon __run` action; this catches that path breaking
      # (e.g. the spawn falling back to a nonexistent pushd.<ext>). On
      # Windows this also exercises the named-pipe transport instead of
      # the unix socket.
      - name: Smoke test — daemon lifecycle
        run: |
          "$BIN" daemon start
          for _ in $(seq 1 15); do
            "$BIN" daemon status | grep -q 'responsive' && break
            sleep 1
          done
          "$BIN" daemon status | grep -q 'responsive'
          "$BIN" daemon stop

      # Build-only: proves the bundle stays target-clean (no accidental
      # host-only native deps). One host is enough for that, so these
      # stay off the Windows leg.
      - name: Cross-compile (windows-x64, darwin-arm64, linux-arm64)
        if: matrix.os == 'ubuntu-latest'
        run: |
          bun build --compile --no-compile-autoload-dotenv --no-compile-autoload-bunfig --external @termless/xtermjs --external @termless/ghostty --external chromium-bidi --target=bun-windows-x64 cli/cli.ts --outfile /tmp/push-windows-x64.exe
          bun build --compile --no-compile-autoload-dotenv --no-compile-autoload-bunfig --external @termless/xtermjs --external @termless/ghostty --external chromium-bidi --target=bun-darwin-arm64 cli/cli.ts --outfile /tmp/push-darwin-arm64
          bun build --compile --no-compile-autoload-dotenv --no-compile-autoload-bunfig --external @termless/xtermjs --external @termless/ghostty --external chromium-bidi --target=bun-linux-arm64 cli/cli.ts --outfile /tmp/push-linux-arm64

      # Binaries are ~100MB each; only keep them when someone asked for a
      # run by hand (workflow_dispatch), not on every PR.
      - name: Upload binaries (manual runs only)
        if: github.event_name == 'workflow_dispatch' && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: push-binaries
          path: /tmp/push-*
          retention-days: 7

  # Non-blocking instrument, NOT a merge gate. The CLI suite runs on
  # `node --test` (canonical) because Bun's node:test shim can't run it yet
  # (oven-sh/bun#5090 — describe()/test() nested inside test() throws during
  # collection). This job runs the same suite under `bun test` only to make
  # that blocker OBSERVABLE: the step summary prints the #5090 count, and when
  # it reaches 0 the shim gap has landed and the canonical runner can flip to
  # Bun (docs/decisions/Bun Runtime Adoption.md, Phase 1). `continue-on-error`
  # keeps a red canary from failing CI; the step itself exits non-zero only if
  # bun produced no summary at all (canary broken, not merely failing tests).
  cli-bun-canary:
    name: Bun test canary (cli, non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # DELIBERATELY `latest`, NOT the cli-binary pin. This canary exists to
          # notice when a *future* Bun release closes the #5090 gap; pinning it
          # to the known-bad 1.3.11 would report the same numbers forever and
          # the `errors → 0` trigger would never fire on its own — defeating the
          # point of making the blocker observable. cli-binary stays pinned (it
          # ships binaries); this one tracks upstream. (Codex P2 on PR #1341.)
          bun-version: latest

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run CLI suite under Bun and summarize
        env:
          TMPDIR: /tmp
          TEMP: /tmp
          TMP: /tmp
        run: |
          # GitHub runs `run:` under `bash -e`. Failures here are EXPECTED (the
          # suite is red under Bun) and we handle every non-zero ourselves, so
          # disable errexit up front — otherwise a benign `[ test ] && x`
          # short-circuit later aborts the whole step.
          set +e

          bun test --preload ./cli/tests/setup-test-home-isolation.mjs cli/tests/*.test.mjs > bun-test.log 2>&1
          bun_exit=$?

          # Strip ANSI so parsing is stable regardless of bun's color detection.
          sed -r "s/\x1b\[[0-9;]*[a-zA-Z]//g" bun-test.log > bun-test.clean.log

          # Surface bun's own ending in the job log — the canary must show its
          # work, or a CI-vs-local divergence can't be diagnosed from here.
          echo "----- bun test exit=$bun_exit; last 30 lines of output: -----"
          tail -n 30 bun-test.clean.log
          echo "------------------------------------------------------------"

          # Parse bun's OWN authoritative summary lines. Do NOT grep the #5090
          # URL: GitHub's ##[error] annotations repeat each error's stack, so a
          # URL count double-counts in CI (though not locally). bun reports
          # `fail` (tests that ran and failed) and `errors` (suite-level throws,
          # ~all #5090 today) as SEPARATE categories — keep them separate.
          ran=$(grep -oE "Ran [0-9]+ tests across [0-9]+ files" bun-test.clean.log | tail -1)
          pass=$(grep -oE "^ *[0-9]+ pass *$" bun-test.clean.log | tail -1 | grep -oE "[0-9]+")
          fail=$(grep -oE "^ *[0-9]+ fail *$" bun-test.clean.log | tail -1 | grep -oE "[0-9]+")
          errors=$(grep -oE "^ *[0-9]+ errors? *$" bun-test.clean.log | tail -1 | grep -oE "[0-9]+")

          if [ -z "$ran" ] || [ -z "$pass" ]; then
            echo "::error::bun test produced no summary — canary broken (bun setup or glob), not merely failing tests (exit=$bun_exit)."
            exit 1
          fi
          : "${fail:=0}"
          : "${errors:=0}"

          {
            echo "## Bun test canary — \`bun test\` over the CLI suite"
            echo ""
            echo "Informational only; canonical CLI tests run on \`node --test\`."
            echo "Numbers are for *this CI environment* — bun collects a different"
            echo "test set locally (see \`Ran …\`), so treat absolute counts as"
            echo "CI-relative, not a fixed baseline."
            echo ""
            echo "| metric | value |"
            echo "| --- | ---: |"
            echo "| pass | $pass |"
            echo "| fail (ran, real Bun divergences) | $fail |"
            echo "| errors (suite-level, ≈ #5090 blocker) | $errors |"
            echo ""
            echo "\`$ran\`"
            echo ""
            echo "**Revisit trigger:** **errors → 0** means Bun's \`node:test\` shim gap (#5090 — \`describe()\`/\`test()\` nested in \`test()\`) has landed. That is *necessary but not sufficient*: the \`fail\` count (real per-test divergences — the \`ws\` gap, timeouts, spinner rendering) must also come down, and collection must stabilise across environments, before the canonical runner can flip to Bun (Phase 2)."
          } >> "$GITHUB_STEP_SUMMARY"

          echo "pass=$pass fail=$fail errors=$errors ($ran)"

  sandbox:
    name: Validate sandbox
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Validate sandbox app syntax
        run: python -m py_compile sandbox/app.py
